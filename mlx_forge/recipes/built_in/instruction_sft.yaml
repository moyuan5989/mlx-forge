id: instruction-sft
name: Instruction Following
description: >
  Train a model to follow instructions accurately. Upload
  instruction-response pairs and the model will learn to
  complete tasks as directed. Best for task-specific assistants.
category: sft
training_type: sft
data_format: completions
icon: ClipboardCheck

recommended_models:
  - "Qwen/Qwen3-1.7B"
  - "Qwen/Qwen3-4B"
  - "Qwen/Qwen2.5-3B"
  - "meta-llama/Llama-3.1-8B"
  - "microsoft/phi-3-mini-4k-instruct"

auto_rules:
  - "if system_memory_gb < 16: enable QLoRA + gradient_checkpointing"
  - "if dataset_samples < 500: reduce num_iters to 500"
  - "if dataset_samples > 10000: enable packing"

config_template:
  adapter:
    preset: "attention-all"
    rank: 16
    scale: 32.0
  data:
    max_seq_length: 2048
    mask_prompt: true
  training:
    optimizer: "adam"
    learning_rate: 1.0e-5
    num_iters: 1000
    batch_size: 2
    steps_per_report: 10
    steps_per_eval: 100
    steps_per_save: 100
    max_grad_norm: 1.0
  runtime:
    run_dir: "~/.mlxforge/runs"
