id: chat-sft
name: Chat Fine-Tuning
description: >
  Fine-tune a model for conversational chat. Upload multi-turn
  conversations and the model will learn to respond in that style.
  Best for chatbots, assistants, and character personas.
category: sft
training_type: sft
data_format: chat
icon: MessageSquare

recommended_models:
  - "Qwen/Qwen3-0.6B"
  - "Qwen/Qwen3-1.7B"
  - "Qwen/Qwen3-4B"
  - "Qwen/Qwen2.5-1.5B"
  - "meta-llama/Llama-3.1-8B"

auto_rules:
  - "if system_memory_gb < 16: enable QLoRA + gradient_checkpointing"
  - "if dataset_samples < 500: reduce num_iters to 500"
  - "if dataset_samples > 10000: enable packing"

config_template:
  adapter:
    preset: "attention-qv"
    rank: 16
    scale: 32.0
  data:
    max_seq_length: 2048
    mask_prompt: true
  training:
    optimizer: "adam"
    learning_rate: 2.0e-5
    num_iters: 1000
    batch_size: 2
    steps_per_report: 10
    steps_per_eval: 100
    steps_per_save: 100
    max_grad_norm: 1.0
  runtime:
    run_dir: "~/.mlxforge/runs"
